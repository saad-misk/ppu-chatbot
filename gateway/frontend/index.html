<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPU Assistant</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="logo-area">
            <img
              src="static/images/ppu-logo.png"
              alt="PPU Logo"
              style="
                width: 60px;
                height: 60px;
                object-fit: contain;
                background: white;
                border-radius: 8px;
                padding: 4px;
              "
            />
            <div class="logo-text">
              <span class="brand">PPU Assistant</span>
              <span class="sub">Palestine Polytechnic University</span>
            </div>
          </div>
          <button id="new-chat-btn">+ New Chat</button>
        </div>

        <div class="sidebar-sessions">
          <div class="sessions-label" id="sessions-label">Recent Chats</div>
          <div id="sessions-list"></div>
        </div>

        <!-- FIXED SIDEBAR FOOTER -->
        <div class="sidebar-footer">
          <div class="user-profile" id="user-profile">
            <div class="user-avatar" id="user-avatar">👤</div>
            <div class="user-info">
              <div class="user-name" id="user-name">Loading...</div>
              <div class="user-role" id="user-role">Student</div>
            </div>
          </div>
          <button
            class="icon-btn admin-btn"
            id="admin-btn"
            onclick="goToAdminDashboard()"
            style="display: none"
            title="Admin Dashboard"
          >
            🛠️
          </button>
        </div>
        <button
          class="icon-btn sidebar-toggle-btn"
          id="sidebar-toggle"
          onclick="toggleSidebar()"
          title="Toggle Sidebar"
        >
          ◀
        </button>
      </aside>
      <div id="main">
        <div id="topbar">
          <div class="topbar-left">
            <div class="bot-avatar">🤖</div>
            <div class="topbar-title">
              <span class="name">PPU Smart Assistant</span>
              <span class="status">
                <span class="status-dot"></span>
                <span id="bot-status">Online</span>
              </span>
            </div>
          </div>
          <div class="topbar-right">
            <div class="lang-toggle" aria-label="Language">
              <button
                class="lang-btn active"
                data-lang="ar"
                onclick="setLang('ar')"
              >
                AR
              </button>
              <button class="lang-btn" data-lang="en" onclick="setLang('en')">
                EN
              </button>
            </div>
            <button
              class="icon-btn"
              title="Clear chat"
              onclick="startNewSession()"
            >
              🗑️
            </button>
            <button
              class="icon-btn logout-btn"
              id="logout-btn"
              onclick="logout()"
              title="تسجيل الخروج / Logout"
            >
              Logout
            </button>
          </div>
        </div>

        <div id="messages"></div>

        <div id="input-area">
          <div class="input-box">
            <textarea
              id="msg-input"
              rows="1"
              placeholder="Ask about fees, schedules, registration…"
            ></textarea>
            <button id="send-btn" disabled>➤</button>
          </div>
          <div class="input-footer">
            <span class="input-hint" id="input-hint"
              >Press Enter to send · Shift+Enter for new line</span
            >
          </div>
        </div>
      </div>
    </div>

    <script src="chat.js"></script>
  </body>
</html>
